name: Secure Deploy to AWS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: video-course-app

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push Docker image
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker buildx create --use --name multiarch || true
        docker buildx build --platform linux/amd64 \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
          --push .
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.10.2

    - name: Create terraform.tfvars
      run: |
        cd terraform
        cat > terraform.tfvars << EOF
        aws_region            = "${{ env.AWS_REGION }}"
        app_name              = "video-course-app"
        environment           = "prod"
        instance_type         = "t3.medium"
        key_pair_name         = "${{ secrets.KEY_PAIR_NAME }}"
        min_size              = 1
        max_size              = 5
        desired_capacity      = 2
        domain_name           = "${{ secrets.DOMAIN_NAME }}"
        hosted_zone_id        = "${{ secrets.HOSTED_ZONE_ID }}"
        gemini_api_key        = "${{ secrets.GEMINI_API_KEY }}"
        nova_api_key          = "${{ secrets.NOVA_API_KEY }}"
        enable_https          = true
        create_route53_records = true
        EOF

    - name: Terraform Init
      working-directory: ./terraform
      run: terraform init

    - name: Terraform Apply
      working-directory: ./terraform
      run: terraform apply -auto-approve -var-file="terraform.tfvars"

    - name: Trigger Instance Refresh
      env:
        AWS_REGION: ${{ env.AWS_REGION }}
      run: |
        set -e
        ASG_NAME=$(cd terraform && terraform output -raw autoscaling_group_name || echo "")
        if [ "$ASG_NAME" == "" ]; then
          echo "⚠️  No ASG found in terraform output. Scanning via AWS CLI..."
          ASG_NAME=$(aws autoscaling describe-auto-scaling-groups --query 'AutoScalingGroups[?contains(AutoScalingGroupName, `video-course-app`)].AutoScalingGroupName' --output text | head -n 1)
        fi
        
        if [ "$ASG_NAME" == "" ] || [ "$ASG_NAME" == "None" ]; then
          echo "❌ ERROR: Could not identify ASG_NAME. Skipping refresh."
          exit 0
        fi

        echo "🔍 Checking status for ASG: $ASG_NAME"
        
        # Check if a refresh is already in progress or pending
        IN_PROGRESS=$(aws autoscaling describe-instance-refreshes \
          --auto-scaling-group-name "$ASG_NAME" \
          --query 'InstanceRefreshes[?Status==`InProgress` || Status==`Pending`].Status' \
          --output text)
        
        if [ "$IN_PROGRESS" != "" ] && [ "$IN_PROGRESS" != "None" ]; then
          echo "⚠️  Existing refresh found ($IN_PROGRESS). Cancelling to prioritize latest code..."
          aws autoscaling cancel-instance-refresh --auto-scaling-group-name "$ASG_NAME"
          
          echo "⏳ Waiting 15 seconds for cancellation to process..."
          sleep 15
        fi

        echo "🚀 Starting new instance refresh for $ASG_NAME..."
        aws autoscaling start-instance-refresh --auto-scaling-group-name "$ASG_NAME"
        echo "✅ Instance refresh triggered successfully."