name: Secure Deploy to AWS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: video-course-app

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # Added proper Buildx setup for reliable container builds
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build, tag, and push Docker image
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker buildx build --platform linux/amd64 \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
          --push .
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.10.2

    # Fixed: Re-added missing required variables like vpc_cidr and mongodb_uri
    - name: Create terraform.tfvars
      run: |
        cd terraform
        cat > terraform.tfvars << EOF
        aws_region             = "${{ env.AWS_REGION }}"
        app_name               = "video-course-app"
        environment            = "prod"
        vpc_cidr               = "10.0.0.0/16"
        instance_type          = "t3.medium"
        key_pair_name          = "${{ secrets.KEY_PAIR_NAME }}"
        min_size               = 1
        max_size               = 5
        desired_capacity       = 2
        domain_name            = "${{ secrets.DOMAIN_NAME }}"
        hosted_zone_id         = "${{ secrets.HOSTED_ZONE_ID }}"
        s3_bucket_name         = "${{ secrets.S3_BUCKET_NAME }}"
        mongodb_uri            = "${{ secrets.MONGODB_URI }}"
        aws_access_key_id      = "${{ secrets.AWS_ACCESS_KEY_ID }}"
        aws_secret_access_key  = "${{ secrets.AWS_SECRET_ACCESS_KEY }}"
        gemini_api_key         = "${{ secrets.GEMINI_API_KEY }}"
        nova_api_key           = "${{ secrets.NOVA_API_KEY }}"
        enable_https           = true
        create_route53_records  = true
        create_cognito_role    = false
        create_ec2_role        = false
        create_ecr_repo        = false
        EOF

    - name: Terraform Init
      working-directory: ./terraform
      run: terraform init

    - name: Terraform Apply
      working-directory: ./terraform
      run: terraform apply -auto-approve -var-file="terraform.tfvars"

    - name: Trigger Instance Refresh
      env:
        AWS_REGION: ${{ env.AWS_REGION }}
      run: |
        set -e
        # Retrieve the ASG name from Terraform outputs
        ASG_NAME=$(cd terraform && terraform output -raw autoscaling_group_name || echo "")
        
        if [ "$ASG_NAME" == "" ]; then
          echo "⚠️  No ASG found in terraform output. Scanning via AWS CLI..."
          ASG_NAME=$(aws autoscaling describe-auto-scaling-groups --query 'AutoScalingGroups[?contains(AutoScalingGroupName, `video-course-app`)].AutoScalingGroupName' --output text | head -n 1)
        fi
        
        if [ "$ASG_NAME" == "" ] || [ "$ASG_NAME" == "None" ]; then
          echo "❌ ERROR: Could not identify ASG_NAME. Skipping refresh."
          exit 1
        fi

        echo "🔍 Checking status for ASG: $ASG_NAME"
        
        # Check for InProgress or Pending refreshes to avoid the InstanceRefreshInProgress error
        REFRESH_STATUS=$(aws autoscaling describe-instance-refreshes \
          --auto-scaling-group-name "$ASG_NAME" \
          --query 'InstanceRefreshes[?Status==`InProgress` || Status==`Pending`].Status' \
          --output text)
        
        if [ -n "$REFRESH_STATUS" ] && [ "$REFRESH_STATUS" != "None" ]; then
          echo "⚠️  Existing refresh found ($REFRESH_STATUS). Cancelling..."
          aws autoscaling cancel-instance-refresh --auto-scaling-group-name "$ASG_NAME"
          sleep 15
        fi

        echo "🚀 Starting new instance refresh for $ASG_NAME..."
        aws autoscaling start-instance-refresh --auto-scaling-group-name "$ASG_NAME"
        echo "✅ Instance refresh triggered successfully."

    # Added: Automated Health Check to verify the new container actually starts
    - name: Wait for Target Group Health
      run: |
        cd terraform
        TARGET_GROUP_ARN=$(terraform output -raw target_group_arn)
        echo "⏳ Waiting for targets in $TARGET_GROUP_ARN to become healthy..."
        
        for i in {1..30}; do
          HEALTH_STATUS=$(aws elbv2 describe-target-health \
            --target-group-arn "$TARGET_GROUP_ARN" \
            --query 'TargetHealthDescriptions[?TargetHealth.State==`healthy`].TargetHealth.State' \
            --output text)
          
          if [ -n "$HEALTH_STATUS" ]; then
            echo "✅ Deployment successful! Your platform is live at https://${{ secrets.DOMAIN_NAME }}"
            exit 0
          fi
          echo "...still waiting ($i/30)..."
          sleep 10
        done
        echo "❌ TIMEOUT: Instances did not become healthy."
        exit 1