name: 🚀 Build & Deploy Video Course App

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🛠️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🧪 Run Unit & Integration Tests
        run: |
          npm install
          npm test
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}

      - name: 🔐 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: 📦 Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🏷️ Extract Git SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: 🐳 Build, Tag, and Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: video-course-app
          IMAGE_TAG: ${{ steps.vars.outputs.sha_short }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .

      - name: 🛡️ Scan Image for Vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/video-course-app:${{ steps.vars.outputs.sha_short }}
          format: 'table'
          exit-code: '1' # Fail the build on High/Critical
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: 📦 Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: video-course-app
          IMAGE_TAG: ${{ steps.vars.outputs.sha_short }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: 🏗️ Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: 🚀 Terraform Apply
        working-directory: ./terraform
        env:
          TF_VAR_container_image_tag: ${{ steps.vars.outputs.sha_short }}
          TF_VAR_gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          TF_VAR_nova_api_key: ${{ secrets.NOVA_API_KEY }}
          TF_VAR_session_secret: ${{ secrets.SESSION_SECRET }}
          TF_VAR_mongodb_uri: ${{ secrets.MONGODB_URI }}
        run: |
          terraform init
          terraform validate
          terraform apply -auto-approve
      - name: 🏥 Post-Deployment Health Check
        run: |
          # Fetch the ALB DNS name dynamically
          ALB_URL=$(aws elbv2 describe-load-balancers --query "LoadBalancers[0].DNSName" --output text)
          echo "Checking health of ALB: http://$ALB_URL/health"
          
          # Retry loop to allow for instance refresh spin-up
          for i in {1..20}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://$ALB_URL/health || echo "failure")
            if [ "$HTTP_CODE" == "200" ]; then
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "⌛ Waiting for healthy response (attempt $i, status: $HTTP_CODE)..."
            sleep 30
          done
          
          echo "❌ Health check failed after 10 minutes!"
          exit 1
