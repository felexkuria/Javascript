name: Secure Deploy to AWS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: video-course-app

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # Added proper Buildx setup for reliable container builds
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build, tag, and push Docker image
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker buildx build --platform linux/amd64 \
          --no-cache \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
          --push .
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.10.2

    # ------------------------------------------------------------------
    # Pre-flight: Provision skool.shopmultitouch.com ACM cert + DNS
    # This must exist BEFORE Terraform tries to enable HTTPS on the ALB.
    # ------------------------------------------------------------------
    - name: Ensure ACM Certificate for skool subdomain
      env:
        DOMAIN: ${{ secrets.DOMAIN_NAME }}
        HOSTED_ZONE_ID: ${{ secrets.HOSTED_ZONE_ID }}
      run: |
        # Check if cert already issued
        EXISTING=$(aws acm list-certificates --region us-east-1 \
          --query "CertificateSummaryList[?DomainName=='${DOMAIN}' && Status=='ISSUED'].CertificateArn" \
          --output text)

        if [ -n "$EXISTING" ] && [ "$EXISTING" != "None" ]; then
          echo "✅ Certificate already exists: $EXISTING"
          echo "ACM_CERT_ARN=$EXISTING" >> $GITHUB_ENV
          exit 0
        fi

        echo "🔐 Requesting ACM certificate for $DOMAIN ..."
        CERT_ARN=$(aws acm request-certificate \
          --domain-name "$DOMAIN" \
          --validation-method DNS \
          --region us-east-1 \
          --query CertificateArn --output text)
        echo "Cert ARN: $CERT_ARN"
        echo "ACM_CERT_ARN=$CERT_ARN" >> $GITHUB_ENV

        # Wait for DNS validation record to appear
        echo "⏳ Waiting for DNS validation CNAME..."
        for i in $(seq 1 20); do
          CNAME=$(aws acm describe-certificate --certificate-arn "$CERT_ARN" \
            --region us-east-1 \
            --query 'Certificate.DomainValidationOptions[0].ResourceRecord' \
            --output json 2>/dev/null || echo "{}")
          NAME=$(echo "$CNAME" | jq -r '.Name // empty')
          VALUE=$(echo "$CNAME" | jq -r '.Value // empty')
          if [ -n "$NAME" ] && [ -n "$VALUE" ]; then
            echo "📝 Adding DNS validation record: $NAME → $VALUE"
            aws route53 change-resource-record-sets \
              --hosted-zone-id "$HOSTED_ZONE_ID" \
              --change-batch "{\"Changes\":[{\"Action\":\"UPSERT\",\"ResourceRecordSet\":{\"Name\":\"$NAME\",\"Type\":\"CNAME\",\"TTL\":300,\"ResourceRecords\":[{\"Value\":\"$VALUE\"}]}}]}" || true
            break
          fi
          echo "   Waiting for validation record ($i/20)..."
          sleep 10
        done

        echo "⏳ Waiting for certificate to be issued (can take ~3 min)..."
        aws acm wait certificate-validated --certificate-arn "$CERT_ARN" --region us-east-1 || true
        STATUS=$(aws acm describe-certificate --certificate-arn "$CERT_ARN" \
          --region us-east-1 --query 'Certificate.Status' --output text)
        echo "Certificate status: $STATUS"

    # ------------------------------------------------------------------
    # Build terraform.tfvars — only real Terraform variables go here.
    # NOTE: mongodb_uri is NOT a Terraform variable; it goes in Secrets
    #       Manager / SSM and is injected at runtime by user_data.sh.
    #       create_ecr_repo = false because ECR already exists.
    # ------------------------------------------------------------------
    - name: Create terraform.tfvars
      run: |
        cd terraform
        cat > terraform.tfvars << EOF
        aws_region             = "${{ env.AWS_REGION }}"
        app_name               = "video-course-app"
        environment            = "prod"
        vpc_cidr               = "10.0.0.0/16"
        instance_type          = "t3.medium"
        key_pair_name          = "${{ secrets.KEY_PAIR_NAME }}"
        min_size               = 1
        max_size               = 5
        desired_capacity       = 2
        domain_name            = "${{ secrets.DOMAIN_NAME }}"
        hosted_zone_id         = "${{ secrets.HOSTED_ZONE_ID }}"
        s3_bucket_name         = "${{ secrets.S3_BUCKET_NAME }}"
        gemini_api_key         = "${{ secrets.GEMINI_API_KEY }}"
        nova_api_key           = "${{ secrets.NOVA_API_KEY }}"
        enable_https           = true
        create_route53_records = true
        create_ecr_repo          = false
        create_dynamodb_tables   = false
        EOF

    - name: Terraform Init
      working-directory: ./terraform
      run: terraform init -reconfigure

    - name: Terraform Plan (visible errors)
      working-directory: ./terraform
      run: terraform plan -var-file="terraform.tfvars" -out=tfplan 2>&1

    - name: Terraform Apply
      working-directory: ./terraform
      run: terraform apply -auto-approve tfplan 2>&1

    - name: Trigger Instance Refresh
      env:
        AWS_REGION: ${{ env.AWS_REGION }}
      run: |
        # NOTE: Do NOT use `set -e` here — cancel commands may return non-zero
        # when there is nothing to cancel, which is perfectly fine.

        # Retrieve the ASG name from Terraform outputs
        ASG_NAME=$(cd terraform && terraform output -raw autoscaling_group_name 2>/dev/null || true)

        if [ -z "$ASG_NAME" ]; then
          echo "⚠️  No ASG found in terraform output. Scanning via AWS CLI..."
          ASG_NAME=$(aws autoscaling describe-auto-scaling-groups \
            --query 'AutoScalingGroups[?contains(AutoScalingGroupName, `video-course-app`)].AutoScalingGroupName' \
            --output text | head -n 1)
        fi

        if [ -z "$ASG_NAME" ] || [ "$ASG_NAME" = "None" ]; then
          echo "❌ ERROR: Could not identify ASG_NAME. Skipping refresh."
          exit 1
        fi

        echo "🔍 Checking status for ASG: $ASG_NAME"

        # ------------------------------------------------------------------
        # Step 1: If an InProgress or Pending refresh exists, cancel it and
        #         POLL until it reaches a terminal state before continuing.
        #         AWS rejects StartInstanceRefresh while one is still active,
        #         even if a cancel has been requested (it takes time).
        # ------------------------------------------------------------------
        ACTIVE_REFRESH=$(aws autoscaling describe-instance-refreshes \
          --auto-scaling-group-name "$ASG_NAME" \
          --query 'InstanceRefreshes[?Status==`InProgress` || Status==`Pending`].InstanceRefreshId' \
          --output text)

        if [ -n "$ACTIVE_REFRESH" ] && [ "$ACTIVE_REFRESH" != "None" ]; then
          echo "⚠️  Active refresh detected (ID: $ACTIVE_REFRESH). Cancelling..."
          aws autoscaling cancel-instance-refresh --auto-scaling-group-name "$ASG_NAME" || true

          echo "⏳ Waiting for cancellation to complete (max 5 min)..."
          MAX_WAIT=30   # 30 × 10 s = 5 minutes
          COUNT=0
          while [ $COUNT -lt $MAX_WAIT ]; do
            CURRENT_STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG_NAME" \
              --instance-refresh-ids "$ACTIVE_REFRESH" \
              --query 'InstanceRefreshes[0].Status' \
              --output text)
            echo "   Status: $CURRENT_STATUS (attempt $((COUNT+1))/$MAX_WAIT)"
            # Terminal states: Successful, Failed, Cancelled, RollbackSuccessful, RollbackFailed
            case "$CURRENT_STATUS" in
              Successful|Failed|Cancelled|RollbackSuccessful|RollbackFailed)
                echo "✅ Previous refresh reached terminal state: $CURRENT_STATUS"
                break
                ;;
            esac
            COUNT=$((COUNT + 1))
            sleep 10
          done

          if [ $COUNT -eq $MAX_WAIT ]; then
            echo "❌ Timed out waiting for previous refresh to cancel. Exiting."
            exit 1
          fi
        fi

        # ------------------------------------------------------------------
        # Step 2: Start the new instance refresh
        # ------------------------------------------------------------------
        echo "🔄 Triggering instance refresh for existing ASG..."
        aws autoscaling start-instance-refresh \
          --auto-scaling-group-name "$ASG_NAME" \
          --strategy Rolling \
          --preferences '{"MinHealthyPercentage":60}'
        echo "✅ Instance refresh triggered successfully."

    # Added: Automated Health Check to verify the new container actually starts
    - name: Wait for Target Group Health
      run: |
        cd terraform
        TARGET_GROUP_ARN=$(terraform output -raw target_group_arn)
        echo "⏳ Waiting for targets in $TARGET_GROUP_ARN to become healthy..."
        
        for i in {1..30}; do
          HEALTH_STATUS=$(aws elbv2 describe-target-health \
            --target-group-arn "$TARGET_GROUP_ARN" \
            --query 'TargetHealthDescriptions[?TargetHealth.State==`healthy`].TargetHealth.State' \
            --output text)
          
          if [ -n "$HEALTH_STATUS" ]; then
            echo "✅ Deployment successful! Your platform is live at https://${{ secrets.DOMAIN_NAME }}"
            exit 0
          fi
          echo "...still waiting ($i/30)..."
          sleep 10
        done
        echo "❌ TIMEOUT: Instances did not become healthy."
        exit 1